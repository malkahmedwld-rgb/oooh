<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة تحدي الصوت</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="start-screen">
            <h1>تحدي الحواجز الصوتي</h1>
            <p>غيّر شكل الصندوق بطبقة صوتك لتعبر الحواجز!</p>
            <button id="start-btn">السماح بالميكروفون والبدء</button>
        </div>
        
        <div id="hud">
            <div id="score-display">التقدم: <span id="score">0</span>%</div>
            <div id="pitch-display">الصوت: <span id="pitch-status">صامت</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
